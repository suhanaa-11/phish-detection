<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishGuard</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, Segoe UI, sans-serif;
      padding: 16px;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    #url-display {
      font-size: 11px;
      color: #666;
      word-break: break-all;
      margin-bottom: 12px;
    }
    #score-box {
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-weight: bold;
    }
    #score-number {
      font-size: 32px;
    }
    #verdict {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #reasons {
      font-size: 13px;
      padding-left: 18px;
    }
    #reasons li {
      margin-bottom: 6px;
    }
    #loading {
      text-align: center;
      color: #888;
      padding: 20px;
    }
    .safe { background: #e6f4ea; color: #1e7e34; }
    .risky { background: #fdecea; color: #c0392b; }
  </style>
</head>
<body>
  <h1>🛡️ PhishGuard</h1>
  <div id="url-display">Loading current tab...</div>
  <div id="loading">Scanning...</div>
  <div id="result" style="display: none;">
    <div id="score-box">
      <div id="score-number"></div>
      <div id="verdict"></div>
    </div>
    <ul id="reasons"></ul>
  </div>
  <script src="popup.js"></script>
</body>
</html>
